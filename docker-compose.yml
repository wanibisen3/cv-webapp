version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env          # SUPABASE_URL, SUPABASE_KEY, FLASK_SECRET, ENCRYPT_KEY
    environment:
      - PORT=8000
    restart: unless-stopped
    # Temp files for CV generation (not persisted between restarts — by design)
    tmpfs:
      - /tmp
